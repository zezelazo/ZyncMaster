# SyncMaster (Zync) — nginx location blocks for api.devlabperu.com
# Paste these INSIDE the existing `server { server_name api.devlabperu.com; ... }` block
# (before the `listen 443 ssl` line), then: sudo nginx -t && sudo systemctl reload nginx
#
# Path-based routing like the other apps (/tf/ -> TimeFocus, etc.). Backend on 127.0.0.1:5007,
# app mounted under PathBase /zync. The WebSocket block (clipboard) must come FIRST (more specific).

# SyncMaster (Zync) — WebSocket de clipboard  (wss://api.devlabperu.com/zync/ws/clipboard)
location /zync/ws/ {
    proxy_pass http://127.0.0.1:5007/zync/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;
    proxy_buffering off;
    tcp_nodelay on;
}

# SyncMaster (Zync) — API REST  (https://api.devlabperu.com/zync/...)
location /zync/ {
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 10;
    # Clipboard images post the encrypted+base64 payload here (a ~3 MB screenshot is ~4.5 MB on the
    # wire). nginx defaults client_max_body_size to 1m, which 413s every image POST; raise it so the
    # app's own ClipboardOptions.HardMaxImageBytes (50 MB) is the real ceiling. Scoped to /zync/ so
    # it does not loosen the limit for the rest of the vhost.
    client_max_body_size 50M;
    proxy_pass http://127.0.0.1:5007/zync/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection keep-alive;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
}

# SyncMaster (Zync) — Web Angular estática  (https://api.devlabperu.com/zync-web/)
# Build estático: sin SSR, sin Node en el VPS (web-ui spec §7). try_files a index.html para el
# routing client-side; bundles hasheados con cache inmutable; index.html sin cache; CSP estricta.
location = /zync-web { return 301 /zync-web/; }

location /zync-web/ {
    root /var/www/devlabperu.com;
    try_files $uri $uri/ /zync-web/index.html;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;

    location ~* ^/zync-web/.+\.(?:js|css|svg|ico|woff2?)$ {
        root /var/www/devlabperu.com;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /zync-web/index.html {
        root /var/www/devlabperu.com;
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }
}
