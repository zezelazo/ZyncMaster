# SyncMaster (Zync) — nginx location blocks for api.devlabperu.com
# Paste these INSIDE the existing `server { server_name api.devlabperu.com; ... }` block
# (before the `listen 443 ssl` line), then: sudo nginx -t && sudo systemctl reload nginx
#
# Path-based routing like the other apps (/tf/ -> TimeFocus, etc.). Backend on 127.0.0.1:5007,
# app mounted under PathBase /zync. The WebSocket block (clipboard) must come FIRST (more specific).

# SyncMaster (Zync) — WebSocket de clipboard  (wss://api.devlabperu.com/zync/ws/clipboard)
location /zync/ws/ {
    proxy_pass http://127.0.0.1:5007/zync/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;
    proxy_buffering off;
    tcp_nodelay on;
}

# SyncMaster (Zync) — API REST  (https://api.devlabperu.com/zync/...)
location /zync/ {
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 10;
    proxy_pass http://127.0.0.1:5007/zync/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection keep-alive;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
}
