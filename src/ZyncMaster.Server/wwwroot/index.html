<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zync Master</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            color: #e6edf3;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        main {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        a {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            background: #1f6feb;
            color: #fff;
            text-decoration: none;
        }
        #status { margin-top: 1.5rem; opacity: 0.85; }
    </style>
</head>
<body>
    <main>
        <h1>Zync Master</h1>
        <p>Calendar sync control panel</p>
        <a href="/connect">Connect Microsoft account</a>
        <p id="status">Loading status&hellip;</p>
    </main>
    <script>
        fetch('/api/panel/status')
            .then(function (r) { return r.json(); })
            .then(function (s) {
                var el = document.getElementById('status');
                el.textContent = 'Connected: ' + (s.connected ? 'yes' : 'no') +
                    ' · Devices: ' + s.deviceCount;
            })
            .catch(function () {
                document.getElementById('status').textContent = 'Status unavailable';
            });
    </script>
</body>
</html>
