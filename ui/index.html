<!DOCTYPE html>
<html lang="en" data-platform="windows">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Zync Master</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/glass.css" />
  <link rel="stylesheet" href="css/aurora.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/clipboard.css" />
</head>
<body>

  <!-- ARIA live region: announces sync state changes to assistive tech -->
  <div id="liveRegion" class="sr-only" aria-live="polite" role="status"></div>

  <!-- Presentation stage: centers the window in a browser; fills the OS frame in native-shell -->
  <div class="stage">

    <!-- The frameless app window -->
    <main class="win" id="win" data-aurora="idle">
      <div class="aurora" aria-hidden="true"></div>

      <div class="win__body">

        <!-- Custom title bar (~36px). Platform decides control placement. -->
        <header class="titlebar" id="titlebar" data-platform="win">
          <div class="titlebar__brand">
            <span class="titlebar__brand-mark" data-icon="logo" data-icon-size="16"></span>
            <span>Zync Master</span>
            <span class="titlebar__tag" id="pausedTag" hidden>PAUSED</span>
          </div>
          <div class="titlebar__spacer"></div>
          <div class="titlebar__controls">
            <!-- Windows-style controls -->
            <div class="wc-group">
              <button class="wc" id="wcMin" type="button" aria-label="Minimize" data-icon="minimize" data-icon-size="11" data-icon-stroke="1.6"></button>
              <button class="wc" id="wcMax" type="button" aria-label="Maximize" data-icon="maximize" data-icon-size="11" data-icon-stroke="1.6"></button>
              <button class="wc wc--close" id="wcClose" type="button" aria-label="Close" data-icon="close" data-icon-size="11" data-icon-stroke="1.8"></button>
            </div>
            <!-- macOS-style traffic lights -->
            <div class="tl-group">
              <button class="tl tl--close" id="tlClose" type="button" aria-label="Close">
                <svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1"><path d="M1.5 1.5 L6.5 6.5 M6.5 1.5 L1.5 6.5" stroke-linecap="round" /></svg>
              </button>
              <button class="tl tl--min" id="tlMin" type="button" aria-label="Minimize">
                <svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1"><path d="M1.5 4 L6.5 4" stroke-linecap="round" /></svg>
              </button>
              <button class="tl tl--max" id="tlMax" type="button" aria-label="Maximize">
                <svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1"><path d="M2.5 2.5 L5.5 5.5 M5.5 2.5 L2.5 5.5" stroke-linecap="round" /></svg>
              </button>
            </div>
          </div>
        </header>

        <!-- Active screen — populated by app.js. One screen at a time, like the design. -->
        <div class="view" id="view" role="main"></div>

        <!-- Bottom nav — built by app.js so the sliding indicator and active state stay in sync. -->
        <nav class="navbar" id="navbar" aria-label="Primary" style="--nav-count:3;--nav-idx:0;"></nav>

        <!-- Launch splash -->
        <div class="launch" id="launch">
          <div class="launch__center">
            <div class="launch__logo">
              <span data-icon="logo" data-icon-size="104"></span>
              <div class="launch__rings"><span></span><span></span><span></span></div>
            </div>
            <div class="launch__name">Zync Master</div>
            <div class="launch__tag">Mirror your calendars, quietly.</div>
          </div>
          <div class="launch__foot">
            <div class="launch__progress"><span></span></div>
            <div class="launch__version num" id="launchVersion">v0.3.0</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
