name: Deploy Server

# Manual only. No artifacts are uploaded or stored: the server is published into a
# temporary folder and deployed from it within this single job (in-process).
on:
  workflow_dispatch:

permissions:
  id-token: write   # required for Azure OIDC login (no long-lived credentials)
  contents: read

concurrency:
  # Serialise deployments: never let two dispatches deploy to production at once. A newer dispatch
  # queues behind the running one (no cancel) so an in-flight deploy always finishes cleanly.
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          # SDK pinned by global.json; NuGet cache keyed on the committed lock files.
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Publish server
        # Only the server graph (Server -> Graph -> Core), all net10.0, builds on Linux.
        # Framework-dependent publish; the App Service runtime stack provides .NET 10.
        run: dotnet publish src/ZyncMaster.Server/ZyncMaster.Server.csproj -c Release -o "${{ runner.temp }}/publish"

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: "${{ runner.temp }}/publish"
