name: CI

# Build + test on pushes to main and on every pull request. Runs red when anything fails. No
# artifacts are uploaded or stored: each job builds and tests in-process and discards its output.
#
# `push` is restricted to `main` deliberately: a feature branch with an open PR is already covered by
# the `pull_request` event, so without this restriction every push fired TWO identical runs (one for
# the push, one for the PR) that the concurrency group cannot dedupe — push and PR carry different
# refs (refs/heads/<branch> vs refs/pull/<n>/merge). Now a PR branch runs CI once (via the PR), and
# main runs CI once on merge.
#
# Two independent jobs:
#   * dotnet — builds the whole solution in Release and runs every .NET test project. It runs on
#     windows-latest because four projects target net10.0-windows (the desktop App's WebView2 and
#     CalExport's Outlook COM interop), which cannot build on Linux. The tests need neither Outlook
#     nor network access, so they run headless on the runner.
#   * js — runs the dependency-free node unit tests for the web panel transport.

# `paths-ignore` skips a run when EVERY changed file is docs-only (markdown / LICENSE / .gitignore) —
# a mixed change that also touches code still runs. NOTE: if branch protection ever REQUIRES these
# checks, a docs-only PR would have no run to satisfy them; revisit this then.
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**/*.md', 'LICENSE', '.gitignore']

# Read-only: CI only needs the checkout, no cloud credentials or write scopes.
permissions:
  contents: read

concurrency:
  # One CI run per ref; cancel an in-flight run when a newer commit lands on the same branch/PR.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          # The exact SDK is pinned by global.json (rollForward: latestPatch); this is the fallback
          # feed family. NuGet restore output is cached and keyed on the committed lock files so a
          # clean run reuses packages instead of re-downloading them.
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build (Release)
        run: dotnet build -c Release

      - name: Test (Release)
        # --no-build reuses the build above; every test project in the solution runs.
        run: dotnet test -c Release --no-build

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Syntax check the UI scripts
        # Check every UI script, not just a hand-picked few. The bare ui/js/*.js modules plus the
        # whole ui/js/views/ directory are all covered so a syntax error anywhere in the panel fails
        # CI. `set -e` (default) plus a loop means the first bad file aborts the step.
        run: |
          for f in ui/js/*.js ui/js/views/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Run js-unit tests
        run: node --test tests/js-unit/*.mjs
