name: Release App

# Manual only. The HUMAN triggers this from the Actions tab (Run workflow) and chooses the
# version; nothing publishes on push or tag. This job builds a self-contained Windows x64
# build of the desktop app, zips it, and creates a GitHub PRERELEASE with the zip attached.
# It does NOT touch Azure. The release is created automatically once dispatched, but because
# the trigger is manual the human stays in control of when (and whether) a release appears.
#
# Runs on windows-latest because the app targets net10.0-windows and embeds WebView2 — it
# cannot be published from Linux. App-side WebView2 is a managed shim (Microsoft.Web.WebView2);
# the end user needs the Evergreen WebView2 Runtime at run time (built into Windows 11).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, no leading v)'
        required: true
        default: '0.1.0'

permissions:
  contents: write   # required to create the GitHub Release and upload the asset

concurrency:
  # One release build at a time. Two dispatches for the same (or different) versions must not run
  # concurrently and race on the same tag/release. A newer dispatch queues; the running one finishes.
  group: release-app
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if the tag already exists
        shell: pwsh
        # Guard against duplicate releases: if v<version> already points at a tag in the repo, abort
        # before building anything. A re-release must bump the version (or the human deletes the tag).
        run: |
          $tag = "v${{ inputs.version }}"
          git fetch --tags --quiet
          $existing = git tag --list $tag
          if ($existing) {
            Write-Error "Tag $tag already exists. Bump the version or delete the existing tag/release first."
            exit 1
          }
          Write-Host "Tag $tag is free; continuing."

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          # SDK pinned by global.json; NuGet cache keyed on the committed lock files.
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Publish app (self-contained win-x64)
        shell: pwsh
        # Self-contained so the user does not need the .NET runtime installed. The App does not
        # LINK ZyncMaster.CalExport — it launches ZyncMaster.CalExport.exe by path at run time —
        # so the App publish itself is free of the Outlook COM interop. CalExport is published
        # separately into a CalExport\ subfolder (next step) so the zip ships both side by side and
        # the App finds it at AppContext.BaseDirectory\CalExport\ZyncMaster.CalExport.exe.
        run: >
          dotnet publish src/ZyncMaster.App/ZyncMaster.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:Version=${{ inputs.version }}
          /p:AssemblyVersion=${{ inputs.version }}.0
          /p:FileVersion=${{ inputs.version }}.0
          -o "${{ runner.temp }}/publish"

      - name: Publish CalExport into the App bundle (self-contained win-x64)
        shell: pwsh
        # CalExport drives Outlook Classic over COM, so it lives next to the App in a CalExport\
        # subfolder of the same publish dir. Self-contained so it runs without a separate .NET
        # install. The end user still needs Outlook Classic installed for it to actually read a
        # calendar — but the bundle no longer depends on the App project referencing it.
        run: >
          dotnet publish src/ZyncMaster.CalExport/ZyncMaster.CalExport.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:Version=${{ inputs.version }}
          /p:AssemblyVersion=${{ inputs.version }}.0
          /p:FileVersion=${{ inputs.version }}.0
          -o "${{ runner.temp }}/publish/CalExport"

      - name: Verify bundle integrity
        shell: pwsh
        # Hard gate: a broken bundle must never reach a release. This catches the class of CalExport
        # packaging bug where the Outlook COM interop assemblies leaked into a self-contained publish
        # (or the self-contained runtime was missing). Any failure here aborts the release.
        run: |
          $ErrorActionPreference = 'Stop'
          $publish = "${{ runner.temp }}/publish"
          $calExport = Join-Path $publish 'CalExport'
          $errors = @()

          # 1. CalExport.exe must exist.
          $exe = Join-Path $calExport 'ZyncMaster.CalExport.exe'
          if (-not (Test-Path $exe)) { $errors += "Missing $exe" }

          # 2. Self-contained: the CoreCLR runtime must be shipped next to the exe.
          $coreclr = Join-Path $calExport 'coreclr.dll'
          if (-not (Test-Path $coreclr)) { $errors += "Missing $coreclr (publish is not self-contained)" }

          # 3. No Outlook COM interop / Office assemblies anywhere in the publish. CalExport talks to
          #    Outlook over late-bound COM; the interop DLL must never ship.
          $office = Get-ChildItem -Path $publish -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '(?i)^(Microsoft\.Office\.Interop\.Outlook|office)\.dll$' }
          if ($office) {
            foreach ($f in $office) { $errors += "Office/Outlook interop assembly leaked into the bundle: $($f.FullName)" }
          }

          # 4. The CalExport deps.json must not reference Office/Outlook interop.
          $deps = Join-Path $calExport 'ZyncMaster.CalExport.deps.json'
          if (-not (Test-Path $deps)) {
            $errors += "Missing $deps"
          } else {
            $depsText = Get-Content $deps -Raw
            if ($depsText -match '(?i)Microsoft\.Office\.Interop\.Outlook' -or $depsText -match '(?i)"office(\.dll)?"') {
              $errors += "deps.json references Office/Outlook interop: $deps"
            }
          }

          if ($errors.Count -gt 0) {
            Write-Host "::error::Bundle verification failed:"
            $errors | ForEach-Object { Write-Host "::error::  - $_" }
            exit 1
          }
          Write-Host "Bundle verification passed: CalExport.exe + coreclr.dll present, no Office interop."

      - name: Trim debug and doc files
        shell: pwsh
        # Shrink the asset: ship only what runs. Strip every .pdb (debug symbols) and the WebView2
        # XML doc file from the whole publish tree. Only .pdb/.xml are removed — never .dll/.exe/.json,
        # which the app needs at run time.
        run: |
          $publish = "${{ runner.temp }}/publish"
          Get-ChildItem -Path $publish -Recurse -File -Include *.pdb, *.xml -ErrorAction SilentlyContinue |
            ForEach-Object {
              Write-Host "Removing $($_.FullName)"
              Remove-Item $_.FullName -Force -ErrorAction SilentlyContinue
            }

      - name: Sign the app executable (only when signing secrets are configured)
        # Optional code-signing. SKIPPED silently unless the SIGNING_CERT secret is present, so the
        # workflow keeps producing unsigned betas today and starts producing signed releases the
        # moment the cert is configured — no further workflow edits needed.
        #
        # Required secrets when enabling:
        #   SIGNING_CERT          base64-encoded PFX (Authenticode) code-signing certificate
        #   SIGNING_CERT_PASSWORD password for the PFX above
        # The PFX is materialised to a temp file, used by signtool, then deleted in the finally block.
        if: ${{ secrets.SIGNING_CERT != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pfxPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          try {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT))
            $exe = "${{ runner.temp }}/publish/ZyncMaster.App.exe"
            & signtool sign `
              /f $pfxPath `
              /p $env:SIGNING_CERT_PASSWORD `
              /fd SHA256 `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              $exe
            if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }
            Write-Host "Signed $exe"
          }
          finally {
            if (Test-Path $pfxPath) { Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue }
          }
        env:
          SIGNING_CERT: ${{ secrets.SIGNING_CERT }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}

      - name: Package zip
        shell: pwsh
        run: |
          $zip = "${{ runner.temp }}/ZyncMaster-App-v${{ inputs.version }}-win-x64.zip"
          Compress-Archive -Path "${{ runner.temp }}/publish/*" -DestinationPath $zip -Force
          "ASSET_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Zync Master App v${{ inputs.version }} (beta)
          prerelease: true
          files: ${{ env.ASSET_PATH }}
          body: |
            ## Zync Master App v${{ inputs.version }} — Windows (beta)

            Early beta build. Unsigned: Windows SmartScreen will warn about an
            "unknown publisher". To run it: click **More info** → **Run anyway**.

            ### What's included
            - Tray-resident desktop app for Windows (calendar sync).
            - Connects to the Zync Master service at `https://zyncmaster.azurewebsites.net`
              by default. You connect your calendar accounts from inside the app.

            ### Requirements
            - Windows 10 or 11 (x64).
            - WebView2 Runtime — already present on Windows 11; on Windows 10 install the
              Evergreen WebView2 Runtime from Microsoft if the window stays blank.
            - No .NET install needed: this build is self-contained.

            ### Install
            1. Download `ZyncMaster-App-v${{ inputs.version }}-win-x64.zip`.
            2. Extract it to a folder of your choice.
            3. Run `ZyncMaster.App.exe`. The app lives in the system tray.
